<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ANKA — Yapay Zeka</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<header class="topbar">
  <div class="clock">
    <div id="clock-time">--:--:--</div>
    <div id="clock-date">--</div>
  </div>
  <div class="brand">
    <h1>ANKA</h1>
    <span>Yapay Zeka Asistan</span>
  </div>
  <div class="status-dot" id="status-dot">●</div>
</header>

<main class="layout">
  <nav class="sidebar">
    <button class="nav-btn active" data-view="chat"><span class="icon">💬</span><span>SOHBET</span></button>
    <button class="nav-btn" data-view="notes"><span class="icon">📋</span><span>NOTLAR</span></button>
    <button class="nav-btn" data-view="settings"><span class="icon">⚙️</span><span>AYAR</span></button>
  </nav>

  <section class="main-area">

    <!-- CHAT -->
    <div class="view active" id="view-chat">
      <div class="chat-stage">

        <!-- Hologram Phoenix -->
        <div class="phoenix-wrap" id="phoenix-wrap">
          <div class="ring r1"></div>
          <div class="ring r2"></div>
          <div class="ring r3"></div>
          <div class="pulse-ring" id="pulse-ring"></div>
          <div class="phoenix-glow" id="phoenix-glow"></div>

          <svg id="phoenix-svg" class="phoenix-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <filter id="glow-filter">
                <feGaussianBlur stdDeviation="3" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <linearGradient id="bodyGrad" x1="0%" y1="100%" x2="0%" y2="0%">
                <stop offset="0%" style="stop-color:#ff4400"/>
                <stop offset="60%" style="stop-color:#ff9900"/>
                <stop offset="100%" style="stop-color:#00e0ff"/>
              </linearGradient>
              <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#00e0ff;stop-opacity:0.85"/>
                <stop offset="100%" style="stop-color:#ff6600;stop-opacity:0.55"/>
              </linearGradient>
            </defs>
            <!-- Sol kanat -->
            <path class="wing-l" d="M100,138 C72,118 32,108 10,76 C32,88 52,83 72,98 C62,73 42,58 22,38 C47,53 67,63 82,83 C77,58 67,38 57,18 C77,38 90,63 92,88Z" fill="url(#wingGrad)" filter="url(#glow-filter)"/>
            <!-- Sağ kanat -->
            <path class="wing-r" d="M100,138 C128,118 168,108 190,76 C168,88 148,83 128,98 C138,73 158,58 178,38 C153,53 133,63 118,83 C123,58 133,38 143,18 C123,38 110,63 108,88Z" fill="url(#wingGrad)" filter="url(#glow-filter)"/>
            <!-- Gövde -->
            <ellipse cx="100" cy="112" rx="16" ry="28" fill="url(#bodyGrad)" filter="url(#glow-filter)"/>
            <!-- Baş -->
            <ellipse cx="100" cy="80" rx="13" ry="15" fill="url(#bodyGrad)" filter="url(#glow-filter)"/>
            <!-- Gaga -->
            <path d="M100,69 L108,63 L100,68Z" fill="#00e0ff" filter="url(#glow-filter)"/>
            <!-- Göz -->
            <circle cx="105" cy="76" r="4" fill="#fff" opacity="0.95"/>
            <circle cx="105" cy="76" r="2" fill="#00e0ff"/>
            <circle cx="106" cy="75" r="0.8" fill="#fff"/>
            <!-- Kuyruk -->
            <path d="M88,138 C83,153 77,163 72,174 C80,160 86,152 90,145Z" fill="url(#bodyGrad)" filter="url(#glow-filter)"/>
            <path d="M100,143 C100,160 98,170 95,181 C100,166 102,156 102,146Z" fill="#00e0ff" opacity="0.8"/>
            <path d="M112,138 C117,153 123,163 128,174 C120,160 114,152 110,145Z" fill="url(#bodyGrad)" filter="url(#glow-filter)"/>
            <!-- Tarama çizgileri -->
            <line x1="0" y1="60" x2="200" y2="60" stroke="#00e0ff" stroke-width="0.4" opacity="0.25"/>
            <line x1="0" y1="100" x2="200" y2="100" stroke="#00e0ff" stroke-width="0.4" opacity="0.25"/>
            <line x1="0" y1="140" x2="200" y2="140" stroke="#00e0ff" stroke-width="0.4" opacity="0.25"/>
          </svg>

          <div class="particles" id="particles"></div>
          <div class="listen-label" id="listen-label">DİNLİYORUM</div>
        </div>

        <!-- Durum metni -->
        <div class="state-text" id="state-text">Merhaba! Size nasıl yardımcı olabilirim?</div>

        <!-- Alt ses görselleştiricisi -->
        <div class="bottom-vis" id="bottom-vis">
          <canvas id="vis-canvas" width="500" height="70"></canvas>
          <div class="vis-tag">⚡ SES ANALİZİ</div>
        </div>

        <!-- Mesajlar -->
        <div class="messages" id="messages"></div>
      </div>

      <!-- Input -->
      <div class="inputbar">
        <button id="mic-btn" class="mic-btn" title="Sesli komut">🎙️</button>
        <input id="chat-input" type="text" placeholder="Anka'ya bir şey sorun..." autocomplete="off"/>
        <button id="send-btn" class="send-btn">➤</button>
      </div>
    </div>

    <!-- NOTLAR -->
    <div class="view" id="view-notes">
      <h2>NOTLAR</h2>
      <div class="notes-bar">
        <input id="note-search" placeholder="Ara..."/>
        <button id="note-new">+ Yeni</button>
      </div>
      <div id="notes-list" class="notes-grid"></div>
    </div>

    <!-- AYARLAR -->
    <div class="view" id="view-settings">
      <h2>AYARLAR</h2>
      <div class="setting-card">
        <label>ASİSTAN ADI</label>
        <input id="set-name" type="text" value="ANKA"/>
      </div>
      <div class="setting-card">
        <label>KİŞİLİK</label>
        <div class="pers-grid">
          <button class="pers-btn active" data-v="Güler Yüzlü">😊 Güler Yüzlü</button>
          <button class="pers-btn" data-v="Profesyonel">💼 Profesyonel</button>
          <button class="pers-btn" data-v="Yaratıcı">🎨 Yaratıcı</button>
          <button class="pers-btn" data-v="Analitik">📊 Analitik</button>
        </div>
      </div>
      <div class="setting-card">
        <label>SES HIZI</label>
        <input type="range" id="voice-rate" min="0.6" max="1.4" step="0.05" value="0.88"/>
        <small id="rate-label">Hız: 0.88x</small>
      </div>
      <div class="setting-card">
        <label>SES TONU</label>
        <input type="range" id="voice-pitch" min="0.5" max="1.2" step="0.05" value="0.75"/>
        <small id="pitch-label">Ton: 0.75x (Kalın erkek sesi)</small>
      </div>
      <button id="save-settings" class="save-btn">KAYDET</button>
      <button id="test-voice" class="test-btn">🔊 Sesi Test Et</button>
    </div>

  </section>
</main>

<footer class="footer">
  <span class="ok">● Sistemler Aktif</span>
  <span>ANKA v2.0</span>
  <span class="creator">⚡ Kurucu: Sadık</span>
</footer>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
